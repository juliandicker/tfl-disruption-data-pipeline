bundle:
  name: tfl-disruption-data-pipeline

variables:
  pipeline_sp_application_id:
    description: >
      Application (client) ID of the pipeline service principal.
      Injected at deploy time via --var from the AZURE_CLIENT_ID GitHub secret.

  bronze_catalog:
    description: Unity Catalog name for the bronze (raw ingestion) layer.
    default: "bronze"

  silver_catalog:
    description: Unity Catalog name for the silver (curated) layer.
    default: "silver"

  gold_catalog:
    description: Unity Catalog name for the gold (presentation) layer.
    default: "gold"

  schema:
    description: Schema name used within bronze and silver catalogs.
    default: "tfl"

  gold_schema:
    description: Schema name used within the gold catalog. Domain-named (travel) rather than source-named (tfl) — gold publishes data products for the travel domain, not a single source.
    default: "travel"

  admin_catalog:
    description: Unity Catalog name for shared governance infrastructure (masking UDFs).
    default: "admin"

  admin_schema:
    description: Schema within the admin catalog that holds shared masking UDFs.
    default: "shared"

  warehouse_id:
    description: >
      ID of the SQL warehouse used to run dashboard queries.
      Provisioned by the infrastructure project; update after each workspace rebuild.

targets:
  dev:
    mode: development
    default: true

include:
  - resources/jobs/*.yml
  - resources/pipelines/*.yml
  - resources/dashboards/*.yml
