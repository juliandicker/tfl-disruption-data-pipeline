resources:
  jobs:
    travel_governance_bootstrap:
      name: travel-governance-bootstrap
      description: >
        One-off bootstrap job. Run once after the pipeline has first populated the tables.
        Do not schedule.

        tag_pii_columns: applies class.* governed tags to known PII columns in silver.tfl
        and gold.travel so ABAC masking is active immediately, without waiting for the
        Data Classification scanner (~24h lag).

        platform.freshness_sla table properties (read by the platform-governance-daily
        job to compute sla_status in admin.shared.retention_compliance) are set directly
        alongside each table's definition — TBLPROPERTIES in the bronze CREATE TABLE
        statements (src/bronze/ingest_tfl.py, generate_profiles.py), table_properties= in
        the silver/gold pipeline definitions (src/pipeline/silver.py, gold.py) — rather
        than via a separate governance script, since Databricks rejects SET TBLPROPERTIES
        via ALTER against Lakeflow-managed streaming tables/materialized views entirely.

        Prerequisite: grant the pipeline SP ASSIGN on each class.* governed tag in
        Catalog Explorer → Govern → Governed Tags → each tag → Permissions.

      run_as:
        service_principal_name: ${var.pipeline_sp_application_id}

      tasks:
        - task_key: tag_pii_columns
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/governance/tag_pii_columns.sql
