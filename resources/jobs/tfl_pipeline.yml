resources:
  jobs:
    tfl_pipeline:
      name: tfl-pipeline
      description: "End-to-end TfL disruption pipeline: bronze ingestion → silver → gold → Lakehouse monitors."

      run_as:
        service_principal_name: ${var.pipeline_sp_application_id}

      max_concurrent_runs: 1

      parameters:
        - name: bronze_catalog
          default: "${var.bronze_catalog}"
        - name: silver_catalog
          default: "${var.silver_catalog}"
        - name: gold_catalog
          default: "${var.gold_catalog}"
        - name: schema
          default: "${var.schema}"

      schedule:
        quartz_cron_expression: "0 0/15 * * * ?"
        timezone_id: "Europe/London"
        pause_status: PAUSED

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - requests
              - faker
              - databricks-sdk

      tasks:
        - task_key: ingest_tfl
          description: "Fetches TfL tube line status and disruption data via the public API."
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/src/bronze/ingest_tfl.py
            parameters:
              - "--catalog"
              - "{{job.parameters.bronze_catalog}}"
              - "--schema"
              - "{{job.parameters.schema}}"

        - task_key: generate_profiles
          description: "Generates synthetic customer profiles using Faker and writes them to bronze."
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/src/bronze/generate_profiles.py
            parameters:
              - "--catalog"
              - "{{job.parameters.bronze_catalog}}"
              - "--schema"
              - "{{job.parameters.schema}}"

        - task_key: run_silver_pipeline
          description: "Runs the silver Declarative Pipeline after both bronze tasks complete."
          depends_on:
            - task_key: ingest_tfl
            - task_key: generate_profiles
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_pipeline.id}

        - task_key: run_gold_pipeline
          description: "Runs the gold Declarative Pipeline after silver completes."
          depends_on:
            - task_key: run_silver_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_pipeline.id}

        - task_key: setup_monitors
          description: "Creates Lakehouse monitors for silver and gold tables (idempotent)."
          depends_on:
            - task_key: run_gold_pipeline
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/src/observability/setup_monitors.py
            parameters:
              - "--silver-catalog"
              - "{{job.parameters.silver_catalog}}"
              - "--gold-catalog"
              - "{{job.parameters.gold_catalog}}"
              - "--schema"
              - "{{job.parameters.schema}}"
