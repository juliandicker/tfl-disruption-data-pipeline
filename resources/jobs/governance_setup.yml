resources:
  jobs:
    governance_setup:
      name: governance-setup
      description: >
        One-off job that applies ABAC column masking policies and Unity Catalog grants for
        silver and gold. Run once after the pipeline has populated the tables. Idempotent —
        safe to re-run after policy changes.

      job_clusters:
        - job_cluster_key: governance_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            data_security_mode: SINGLE_USER

      tasks:
        - task_key: apply_abac
          description: "Creates masking functions, applies column masks, and sets catalog grants."
          job_cluster_key: governance_cluster
          spark_python_task:
            python_file: /Workspace${workspace.file_path}/src/governance/setup_abac.py
