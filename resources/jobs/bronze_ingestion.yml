resources:
  jobs:
    bronze_ingestion:
      name: bronze-ingestion
      description: "Ingests TfL tube line status and synthetic customer profiles into bronze Delta tables."

      run_as:
        service_principal_name: ${var.pipeline_sp_application_id}

      schedule:
        quartz_cron_expression: "0 0/15 * * * ?"
        timezone_id: "Europe/London"
        pause_status: UNPAUSED

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - requests
              - faker

      tasks:
        - task_key: ingest_tfl
          description: "Fetches TfL tube line status and disruption data via the public API."
          environment_key: default
          spark_python_task:
            python_file: /Workspace${workspace.file_path}/src/bronze/ingest_tfl.py

        - task_key: generate_profiles
          description: "Generates synthetic customer profiles using Faker and writes them to bronze."
          environment_key: default
          spark_python_task:
            python_file: /Workspace${workspace.file_path}/src/bronze/generate_profiles.py
