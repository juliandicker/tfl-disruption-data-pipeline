resources:
  pipelines:
    gold_pipeline:
      name: gold-pipeline
      catalog: gold
      schema: default
      serverless: true
      channel: CURRENT
      libraries:
        - file:
            path: /Workspace${workspace.file_path}/src/pipeline/gold.py
      continuous: false
      development: false

      permissions:
        - service_principal_name: ${var.pipeline_sp_application_id}
          level: IS_OWNER
