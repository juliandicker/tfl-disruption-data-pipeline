resources:
  pipelines:
    gold_pipeline:
      name: gold-pipeline
      catalog: ${var.gold_catalog}
      schema: ${var.gold_schema}
      serverless: true
      channel: CURRENT
      configuration:
        silver_catalog: ${var.silver_catalog}
        schema: ${var.schema}
      libraries:
        - file:
            path: ${workspace.file_path}/src/pipeline/gold.py
      continuous: false
      development: false

      permissions:
        - service_principal_name: ${var.pipeline_sp_application_id}
          level: IS_OWNER
