resources:
  pipelines:
    silver_pipeline:
      name: silver-pipeline
      catalog: silver
      schema: default
      serverless: true
      channel: CURRENT
      libraries:
        - notebook:
            path: ${workspace.file_path}/src/pipeline/silver.py
      continuous: false
      development: false

      permissions:
        - service_principal_name: ${var.pipeline_sp_application_id}
          level: IS_OWNER
