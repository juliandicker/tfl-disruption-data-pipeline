resources:
  pipelines:
    silver_pipeline:
      name: silver-pipeline
      catalog: ${var.silver_catalog}
      schema: ${var.schema}
      serverless: true
      channel: CURRENT
      configuration:
        bronze_catalog: ${var.bronze_catalog}
        schema: ${var.schema}
      libraries:
        - file:
            path: /Workspace${workspace.file_path}/src/pipeline/silver.py
      continuous: false
      development: false

      permissions:
        - service_principal_name: ${var.pipeline_sp_application_id}
          level: IS_OWNER
