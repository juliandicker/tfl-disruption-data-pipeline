name: Databricks Bundle Deploy

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "resources/**"
      - "databricks.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
permissions:
  id-token: write  # required for OIDC token exchange
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v5

      # sp-tfl-pipeline has no Azure subscription permissions — only Databricks catalog grants.
      # allow-no-subscriptions lets the OIDC exchange succeed without subscription access.
      # The resulting Azure AD token is all we need to get a Databricks-scoped token.
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - uses: databricks/setup-cli@main

      # Exchange the Azure AD token for a Databricks-scoped token.
      # Resource ID 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d is the well-known Azure Databricks app.
      # No client secret is stored anywhere — the OIDC token does the work.
      - name: Exchange Azure token for Databricks token
        run: |
          echo "DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)" >> $GITHUB_ENV

      - name: Resolve warehouse ID
        run: |
          WH_ID=$(databricks warehouses list --output json \
            | jq -r '.[] | select(.name == "travel-sql-warehouse") | .id')
          if [ -z "$WH_ID" ]; then
            echo "Error: warehouse 'travel-sql-warehouse' not found — provision it in the infrastructure project first"
            exit 1
          fi
          echo "WAREHOUSE_ID=$WH_ID" >> $GITHUB_ENV
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Deploy bundle
        run: databricks bundle deploy --force --var "pipeline_sp_application_id=${{ secrets.AZURE_CLIENT_ID }}" --var "warehouse_id=$WAREHOUSE_ID"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install seed script dependencies
        run: pip install databricks-sdk pandas pyarrow

      # No-ops after the first successful deploy: reload_bronze_seed.py checks
      # bronze.tfl.tfl_arrivals for existing rows and skips (--ci) rather than
      # failing once real ingestion data is present. Authenticates as
      # sp-tfl-pipeline via DATABRICKS_HOST/DATABRICKS_TOKEN — the same SP
      # that already holds bronze's grants as tfl_pipeline's run_as identity.
      - name: Seed bronze data (first deploy only)
        run: python tools/seed_data/reload_bronze_seed.py --ci
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

