name: Databricks Bundle Deploy

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "resources/**"
      - "databricks.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
permissions:
  id-token: write  # required for OIDC token exchange
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v5

      # sp-tfl-pipeline has no Azure subscription permissions — only Databricks catalog grants.
      # allow-no-subscriptions lets the OIDC exchange succeed without subscription access.
      # The resulting Azure AD token is all we need to get a Databricks-scoped token.
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - uses: databricks/setup-cli@main

      # Exchange the Azure AD token for a Databricks-scoped token.
      # Resource ID 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d is the well-known Azure Databricks app.
      # No client secret is stored anywhere — the OIDC token does the work.
      - name: Exchange Azure token for Databricks token
        run: |
          echo "DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)" >> $GITHUB_ENV

      - name: Deploy bundle
        run: databricks bundle deploy --force --var "pipeline_sp_application_id=${{ secrets.AZURE_CLIENT_ID }}"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Bootstrap class.* tags on PII columns
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        run: |
          # Assign class.* governed tags to known PII columns.
          # Requires ASSIGN on the governed tag policy — held by account admins
          # and any principal explicitly granted ASSIGN.
          # "already exists" on re-deploys is expected (|| true).
          # Fails gracefully if tables don't exist yet (first deploy).
          databricks entity-tag-assignments create \
            "silver.tfl.customer_journeys.full_name" "class.name" "columns" || true
          databricks entity-tag-assignments create \
            "silver.tfl.customer_journeys.email" "class.email_address" "columns" || true
          databricks entity-tag-assignments create \
            "silver.tfl.customer_journeys.date_of_birth" "class.date_of_birth" "columns" || true
          databricks entity-tag-assignments create \
            "silver.tfl.customer_journeys.home_postcode" "class.location" "columns" || true
          databricks entity-tag-assignments create \
            "gold.tfl.notification_targets.full_name" "class.name" "columns" || true
          databricks entity-tag-assignments create \
            "gold.tfl.notification_targets.email" "class.email_address" "columns" || true
          echo "class.* tag bootstrapping complete"
